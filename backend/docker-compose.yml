name: jinxus

services:
  jinxus:
    build: .
    container_name: jinxus-backend
    ports:
      - "19000:19000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JINXUS_PORT=19000
      - JINXUS_DEBUG=false
      - CLOUDFLARE_API_TOKEN=cfut_E1osrgpP5jYX773ypfHpwpPbAs5yMIATJ7cmHot2b2b51529
      - WORKSPACE_ROOT=/home/jinsookim
      - PROJECT_ROOT=/home/jinsookim/jinxus
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./jinxus:/app/jinxus           # Python 소스 (코드 변경 → restart만)
      - ./requirements.txt:/app/requirements.txt  # 패키지 목록 (변경 → restart 시 자동 pip install)
      - ./entrypoint.sh:/app/entrypoint.sh  # 엔트리포인트
      - ./data:/app/data
      - ./prompts:/app/prompts
      - /home/jinsookim:/home/jinsookim:rw  # filesystem MCP용
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker 소켓

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - jinxus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"
    volumes:
      - jinxus_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Matrix Synapse (팀 채팅 플랫폼) ──────────────────────────────
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: jinxus-synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
      - ./synapse/appservices:/data/appservices
    ports:
      - "8008:8008"
    depends_on:
      synapse_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  synapse_db:
    image: postgres:15-alpine
    container_name: jinxus-synapse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=jinxus_matrix_2026
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - jinxus_synapse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  jinxus_redis_data:
  jinxus_qdrant_data:
  jinxus_synapse_db:
